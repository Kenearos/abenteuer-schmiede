    invoke: bmad-as-regelwaechter
  - label: "Probenschwierigkeiten berechnen"
    invoke: bmad-as-regelwaechter
  - label: "NSC-Werte validieren"
    invoke: bmad-as-regelwaechter
  - label: "Magiesystem prüfen"
